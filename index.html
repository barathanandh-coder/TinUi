<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TinPyUI Application</title>
    <link rel="preload" href="/fonts/Cyber.ttf" as="font">
    <link rel="preload" href="heavy-background.png" as="image">
    <script src="wasm_exec.js"></script>
    <script>
        const go = new Go();
        WebAssembly.instantiateStreaming(fetch('app.wasm'), go.importObject).then(result => {
            go.run(result.instance);
            fetch('app.ir.json').then(r => r.text()).then(json => {
                BootTinUI(json);
            });
        });
    </script>
</head>
<body>
    <div id="tinui-root">
        <div id="tin-node-1" style="display: none;">
        </div>
        <div id="tin-node-4" data-transition-out="slide-to-left" data-transition-duration="smooth" data-transition-in="slide-from-right" style="display: block; position: relative; width: 100%; height: 100%; overflow: hidden;">
            <div id="tin-node-5" data-route-path="/" style="display: block; position: absolute; top: 0; left: 0; width: 100%; min-height: 100vh;">
            </div>
            <div id="tin-node-6" data-route-path="/settings" style="display: block; position: absolute; top: 0; left: 0; width: 100%; min-height: 100vh;">
            </div>
        </div>
        <div id="tin-node-7" style="display: flex; flex-direction: column; box-sizing: border-box; padding: 40px;">
            <div id="tin-node-8" data-entrance-choreography="cascade-down" data-hero-background="particle-net" style="display: flex; flex-direction: column; box-sizing: border-box; position: relative; overflow: hidden; min-height: 400px;">
                <h1 id="tin-node-9" style="font-size: 3.5rem; font-weight: 800; margin: 0; background: linear-gradient(45deg, #00f2fe, #9b51e0); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
                    Welcome to TinUI
                </h1>
                <button id="tin-node-10" data-click-effect="ripple" data-hover-effect="glow" style="cursor: pointer; display: inline-flex; align-items: center; justify-content: center; font-weight: 600; border: none; transition: all 0.2s ease;">
                    Open Settings
                </button>
                <img id="tin-node-11" data-asset-priority="lazy" loading="lazy" src="heavy-background.png">
                </img>
            </div>
        </div>
        <div id="tin-node-12" data-destroy-strategy="immediate" style="display: flex; flex-direction: column; box-sizing: border-box; padding: 40px;">
            <p id="tin-node-13">
                Settings Page
            </p>
            <button id="tin-node-14" style="cursor: pointer; display: inline-flex; align-items: center; justify-content: center; font-weight: 600; border: none; transition: all 0.2s ease;">
                Back
            </button>
            <div id="tin-node-15" style="display: flex; flex-direction: column; box-sizing: border-box; display: none !important;">
                <p id="tin-node-16">
                    Hidden Card
                </p>
            </div>
        </div>
    </div>
</body>
</html>
